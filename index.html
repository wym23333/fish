
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TikTok Clone - Mobile View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0; /* Neutral gray background for the workspace */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #root {
            width: 100%;
            height: 100%;
            max-width: 430px; /* Max width for larger screens */
            max-height: 932px; /* Max height for larger screens */
            background: white;
            position: relative;
            overflow: hidden;
        }
        /* Desktop view - show phone frame */
        @media (min-width: 431px) {
            #root {
                width: 355px;
                height: 662px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 8px #1f2937;
                border-radius: 40px;
                flex-shrink: 0;
            }
        }
        /* Mobile view - full screen */
        @media (max-width: 430px) {
            body {
                background-color: white;
            }
            #root {
                border-radius: 0;
                box-shadow: none;
                /* Support for notch/dynamic island devices */
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "framer-motion": "https://esm.sh/framer-motion@^11.11.17"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
